<html>
<head>
    <title>Simulator</title>
    <style>
        /* Add your CSS here */
    </style>
</head>
<body>
    <div id="access-banner" style="display:none;"></div>
    <div id="tracks">
        <div class="track" data-domain="Linux" data-paid="false">Linux Track</div>
        <div class="track" data-domain="Cloud" data-paid="true">Cloud Track</div>
        <div class="track" data-domain="AI" data-paid="true">AI Track</div>
        <div class="track" data-domain="Containers" data-paid="false">Containers Track</div>
        <div class="track" data-domain="NVIDIA" data-paid="true">NVIDIA Track</div>
    </div>
    <script>
        function getURLParameter(name) {
            name = name.replace(/[
]/g, '');
            return decodeURIComponent((new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.href) || [null, ''])[1].replace(/\+/g, '%20')) || null;
        }

        function filterTracks() {
            var domain = getURLParameter('domain');
            var paidStatus = getURLParameter('paid'); // should be 'true' or 'false'
            var tracks = document.querySelectorAll('.track');
            var accessBanner = document.getElementById('access-banner');
            var isPaid = paidStatus === 'true';

            tracks.forEach(function(track) {
                var trackDomain = track.getAttribute('data-domain');
                var trackPaid = track.getAttribute('data-paid') === 'true';

                if ((domain && trackDomain !== domain) || (isPaid && !trackPaid) || (!isPaid && trackPaid)) {
                    track.style.display = 'none';
                } else {
                    track.style.display = 'block';
                }
            });

            // Display access banner if relevant
            if (isPaid) {
                accessBanner.innerText = 'You have access to paid tracks.';
                accessBanner.style.display = 'block';
            }
        }

        filterTracks();
    </script>
</body>
</html>
